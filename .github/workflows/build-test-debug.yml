name: Build & Test Debug

on:
  push:
    branches: [ master, staging, trying ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false && github.actor != 'DeltaV-Bot' && github.actor != 'SimpleStation14'
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Content.Tests
            os: ubuntu-latest
            project: Content.Tests/Content.Tests.csproj
            filter: ''
          - name: Content.IntegrationTests (maps & save/load)
            os: ubuntu-latest
            project: Content.IntegrationTests/Content.IntegrationTests.csproj
            filter: 'FullyQualifiedName~Content.IntegrationTests.Tests.PostMapInitTest|FullyQualifiedName~Content.IntegrationTests.Tests.SaveLoadMapTest|FullyQualifiedName~Content.IntegrationTests.Tests.SaveLoadSaveTest|FullyQualifiedName~Content.IntegrationTests.Tests._Lavaland.LavalandGenerationTest|FullyQualifiedName~Content.IntegrationTests.Tests.SalvageTest'
          - name: Content.IntegrationTests (simulation-heavy)
            os: ubuntu-latest
            project: Content.IntegrationTests/Content.IntegrationTests.csproj
            filter: 'FullyQualifiedName~Content.IntegrationTests.Tests.EntityTest|FullyQualifiedName~Content.IntegrationTests.Tests.Power.PowerTest|FullyQualifiedName~Content.IntegrationTests.Tests.Replays.ReplayTests|FullyQualifiedName~Content.IntegrationTests.Tests.Networking|FullyQualifiedName~Content.IntegrationTests.Tests.GameRules|FullyQualifiedName~Content.IntegrationTests.Tests.RoundEndTest|FullyQualifiedName~Content.IntegrationTests.Tests.Round.JobTest|FullyQualifiedName~Content.IntegrationTests.Tests.Station'
          - name: Content.IntegrationTests (rest)
            os: ubuntu-latest
            project: Content.IntegrationTests/Content.IntegrationTests.csproj
            filter: 'FullyQualifiedName!~Content.IntegrationTests.Tests.PostMapInitTest&FullyQualifiedName!~Content.IntegrationTests.Tests.SaveLoadMapTest&FullyQualifiedName!~Content.IntegrationTests.Tests.SaveLoadSaveTest&FullyQualifiedName!~Content.IntegrationTests.Tests._Lavaland.LavalandGenerationTest&FullyQualifiedName!~Content.IntegrationTests.Tests.SalvageTest&FullyQualifiedName!~Content.IntegrationTests.Tests.EntityTest&FullyQualifiedName!~Content.IntegrationTests.Tests.Power.PowerTest&FullyQualifiedName!~Content.IntegrationTests.Tests.Replays.ReplayTests&FullyQualifiedName!~Content.IntegrationTests.Tests.Networking&FullyQualifiedName!~Content.IntegrationTests.Tests.GameRules&FullyQualifiedName!~Content.IntegrationTests.Tests.RoundEndTest&FullyQualifiedName!~Content.IntegrationTests.Tests.Round.JobTest&FullyQualifiedName!~Content.IntegrationTests.Tests.Station'

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Master
      uses: actions/checkout@v3.6.0

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3.2.0
      with:
        dotnet-version: 9.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /p:WarningsAsErrors=nullable /m

    - name: Run tests
      shell: pwsh
      run: |
        $env:DOTNET_gcServer=1
        $testArgs = @(
          'test',
          '--no-build',
          '--configuration',
          'DebugOpt',
          '${{ matrix.project }}'
        )

        $filter = '${{ matrix.filter }}'
        if ($filter -ne '') {
          $testArgs += @('--filter', $filter)
        }

        $testArgs += @('--', 'NUnit.ConsoleOut=0')
        dotnet @testArgs
  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
